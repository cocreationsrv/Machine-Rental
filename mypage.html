<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ ｜ 共創レンタル</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <div class="wrap">
    <p class="kicker">MY PAGE</p>
    <h1>ご注文履歴・返却手続き</h1>
  </div>
</div>

<section class="section">
  <div class="wrap" style="max-width:820px;">
    <div id="orders-list"></div>
  </div>
</section>

<div id="return-modal" style="display:none;position:fixed;inset:0;background:rgba(11,61,66,.55);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;text-align:center;">
    <p class="step-badge">返却（引取）手続き</p>
    <h3 style="margin:6px 0 10px;font-size:17px;">回収受付コード</h3>
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 6px;">ご希望の回収日：最短2営業日後。訪問スタッフにこちらのコードをご提示ください</p>
    <div class="barcode"></div>
    <p style="font-size:11px;color:var(--muted);">梱包・送り状の用意は不要です。引取送料は無料です。</p>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-ghost" id="modal-cancel" style="flex:1;">閉じる</button>
      <button class="btn btn-primary" id="modal-confirm" style="flex:1;">返却手続きを完了する</button>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="app.js"></script>
<script>
  mountChrome("");
  seedOrderIfEmpty();
  let targetOrderId = null;

  function productIconOf(order) {
    return order.icon || (getProduct(order.productId) || {}).id || "trb9020h";
  }
  function productCatBg(order) {
    const p = getProduct(order.productId);
    return p ? CATEGORY_META[p.category].bgFrom : "var(--cardbg)";
  }

  function renderOrders() {
    const orders = readOrders();
    const el = document.getElementById("orders-list");
    if (orders.length === 0) {
      el.innerHTML = `<div class="empty-state"><p>ご注文履歴はまだありません。</p><a class="btn btn-primary" href="index.html">商品を見てみる</a></div>`;
      return;
    }
    el.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="head">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="thumb" style="width:48px;height:48px;border-radius:10px;background:${productCatBg(o)};display:flex;align-items:center;justify-content:center;">
              <div style="width:78%;height:78%;">${PRODUCT_ART[productIconOf(o)] || ""}</div>
            </div>
            <div>
              <div style="font-weight:700;font-size:14px;">${o.name || (getProduct(o.productId) || {}).name || "商品"}</div>
              <div style="font-size:11.5px;color:var(--muted);">注文番号 ${o.id}　/　${o.planLabel}　/　${o.orderedAt}</div>
            </div>
          </div>
          <span class="status-pill ${o.status === "using" ? "status-using" : "status-returned"}">${o.status === "using" ? "利用中" : "返却済み"}</span>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">お支払い金額：<b style="color:var(--dark);">${yen(o.price)}</b></div>
        <div style="display:flex;gap:10px;">
          ${o.status === "using" ? `<button class="btn btn-outline btn-sm" data-return="${o.id}">返却手続きへ進む</button>
          <a class="btn btn-ghost btn-sm" href="product.html?id=${o.productId}">そのまま購入を検討する</a>` : `<span style="font-size:12px;color:var(--muted);">ご利用ありがとうございました</span>`}
        </div>
      </div>
    `).join("");

    el.querySelectorAll("[data-return]").forEach(btn => {
      btn.addEventListener("click", () => {
        targetOrderId = btn.dataset.return;
        document.getElementById("return-modal").style.display = "flex";
      });
    });
  }

  document.getElementById("modal-cancel").addEventListener("click", () => {
    document.getElementById("return-modal").style.display = "none";
  });
  document.getElementById("modal-confirm").addEventListener("click", () => {
    const orders = readOrders();
    const idx = orders.findIndex(o => o.id === targetOrderId);
    if (idx >= 0) orders[idx].status = "returned";
    writeOrders(orders);
    document.getElementById("return-modal").style.display = "none";
    showToast("返却手続きが完了しました");
    renderOrders();
  });

  if (new URLSearchParams(location.search).get("ordered") === "1") {
    setTimeout(() => showToast("ご注文ありがとうございます"), 300);
  }

  renderOrders();
</script>
</body>
</html>
